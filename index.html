<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="قصاصات المكتب">
    <title>قصاصات المكتب الاستراتيجي</title>
    
    <link href="https://fonts.cdnfonts.com/css/dubai" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0b9a91;
            --secondary-color: #534741;
            --bg-color: #cbd5e1;
            --white: #ffffff;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Dubai', sans-serif; }
        body { background-color: var(--bg-color); display: flex; flex-direction: column; min-height: 100vh; }

        .controls-panel {
            width: 100%; background: var(--white); padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 1rem;
        }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .controls-panel { width: 380px; height: 100vh; overflow-y: auto; position: sticky; top: 0; }
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
        .sidebar-logo { width: 40px; height: auto; }
        .header-title { 
            color: var(--primary-color); font-size: 1.3rem; font-weight: 700; 
            border-right: 4px solid var(--primary-color); padding-right: 10px; 
        }
        
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--secondary-color); }
        input, textarea, select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; width: 100%; }

        .btn-print { background-color: var(--primary-color); color: var(--white); border: none; padding: 1rem; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .history-section { margin-top: 2rem; border-top: 2px solid #f1f5f9; padding-top: 1rem; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-title { font-weight: 700; font-size: 1rem; color: var(--secondary-color); }
        .btn-clear-all { background: none; border: none; color: var(--danger-color); font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete-item { background: #fee2e2; color: var(--danger-color); border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; }

        .preview-area { flex: 1; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; background: #94a3b8; }
        .snippet-container { background-color: var(--white); position: relative; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .size-a6 { width: 10.5cm; height: 14.8cm; }
        .size-square { width: 12cm; height: 12cm; }
        .size-a5 { width: 14.8cm; height: 21cm; }

        .theme-white { background: var(--white); color: var(--secondary-color); }
        .theme-turquoise { background: var(--primary-color); color: var(--white); }
        .theme-turquoise .logo-img { filter: brightness(0) invert(1); }
        .theme-turquoise .snippet-title::after { background-color: rgba(255,255,255,0.4); }

        .snippet-content { padding: 1.2cm; height: 100%; display: flex; flex-direction: column; }
        .logo-header { text-align: center; margin-bottom: 0.8rem; margin-top: -0.8cm; }
        .logo-img { max-width: 65px; height: auto; }
        
        .snippet-title { 
            font-size: 1.6rem; font-weight: 700; text-align: center; 
            margin-bottom: 1.5rem; position: relative; padding-bottom: 10px;
        }
        .snippet-title::after {
            content: ""; position: absolute; bottom: 0; left: 20%; right: 20%;
            height: 2px; background-color: var(--primary-color); border-radius: 2px;
        }

        .desc-container { flex: 1; overflow: hidden; display: flex; align-items: flex-start; }
        
        /* التعديل الجديد للمحاذاة المتقدمة */
        .snippet-desc { 
            width: 100%; 
            line-height: 1.8; 
            text-align: justify; 
            text-justify: inter-character; /* تمديد الحروف لملء الفراغات */
            font-size: 1.3rem; 
            white-space: pre-wrap; 
        }

        .snippet-footer { margin-top: auto; padding-top: 1rem; border-top: 1.5px solid #f1f5f9; text-align: center; }
        .footer-org { font-weight: 700; font-size: 1.05rem; }
        .footer-date { font-size: 0.9rem; width: 100%; text-align: center; margin-top: 5px; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            .controls-panel { display: none !important; }
            .preview-area { padding: 0; display: block; background: none; }
            .snippet-container { box-shadow: none; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1); border: 1px dashed #bbb; }
        }
    </style>
</head>
<body>

    <aside class="controls-panel">
        <div class="sidebar-header">
            <img src="bso.png" alt="Logo" class="sidebar-logo">
            <div class="header-title">قصاصات المكتب الاستراتيجي</div>
        </div>
        
        <div class="form-group">
            <label>نمط التصميم</label>
            <select id="select-theme">
                <option value="theme-white">تصميم أبيض رسمي</option>
                <option value="theme-turquoise">تصميم فيروزي</option>
            </select>
        </div>

        <div class="form-group">
            <label>حجم الورقة</label>
            <select id="select-size">
                <option value="size-a6">A6 (ربع صفحة)</option>
                <option value="size-square">مربع (12x12 سم)</option>
                <option value="size-a5">A5 (نصف صفحة)</option>
            </select>
        </div>

        <div class="form-group">
            <label>العنوان</label>
            <input type="text" id="input-title" placeholder="عنوان القصاصة...">
        </div>

        <div class="form-group">
            <label>المحتوى</label>
            <textarea id="input-desc" rows="5" placeholder="اكتب المحتوى هنا..."></textarea>
        </div>

        <button class="btn-print" id="print-trigger">تصدير PDF وحفظ</button>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title">السجل المحفوظ</div>
                <button class="btn-clear-all" onclick="clearAllHistory()">مسح الكل</button>
            </div>
            <div class="history-list" id="history-container"></div>
        </div>
    </aside>

    <main class="preview-area">
        <div class="snippet-container size-a6 theme-white" id="snippet-box">
            <div class="snippet-content">
                <div class="logo-header">
                    <img src="bso.png" alt="Logo" class="logo-img">
                </div>
                <h1 class="snippet-title" id="display-title"></h1>
                <div class="desc-container" id="desc-parent">
                    <p class="snippet-desc" id="display-desc"></p>
                </div>
                <div class="snippet-footer">
                    <div class="footer-org">المكتب الاستراتيجي لتطوير منطقة الباحة</div>
                    <div class="footer-date">٢٣ أبريل ٢٠٢٦</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputs = {
            title: document.getElementById('input-title'),
            desc: document.getElementById('input-desc'),
            theme: document.getElementById('select-theme'),
            size: document.getElementById('select-size')
        };
        const displays = {
            title: document.getElementById('display-title'),
            desc: document.getElementById('display-desc'),
            box: document.getElementById('snippet-box'),
            parent: document.getElementById('desc-parent'),
            history: document.getElementById('history-container')
        };

        function updateFontSize() {
            const maxHeight = displays.parent.clientHeight;
            let size = 1.3;
            displays.desc.style.fontSize = size + "rem";
            while (displays.desc.scrollHeight > maxHeight && size > 0.6) {
                size -= 0.05;
                displays.desc.style.fontSize = size + "rem";
            }
        }

        function saveToHistory() {
            if (!inputs.desc.value.trim() && !inputs.title.value.trim()) return;
            const snippetData = {
                id: Date.now(),
                title: inputs.title.value,
                desc: inputs.desc.value,
                theme: inputs.theme.value,
                size: inputs.size.value,
                timestamp: new Date().toLocaleString('ar-SA')
            };
            let history = JSON.parse(localStorage.getItem('bso_history') || '[]');
            history.unshift(snippetData);
            localStorage.setItem('bso_history', JSON.stringify(history));
            renderHistory();
        }

        window.deleteItem = function(id, event) {
            event.stopPropagation();
            if(confirm('حذف القصاصة؟')) {
                let history = JSON.parse(localStorage.getItem('bso_history') || '[]');
                history = history.filter(item => item.id !== id);
                localStorage.setItem('bso_history', JSON.stringify(history));
                renderHistory();
            }
        };

        window.clearAllHistory = function() {
            if(confirm('مسح السجل بالكامل؟')) {
                localStorage.removeItem('bso_history');
                renderHistory();
            }
        };

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('bso_history') || '[]');
            displays.history.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadSnippetById(${item.id})">
                    <div class="item-content">
                        <strong>${item.title || '(بدون عنوان)'}</strong>
                        <span class="item-date">${item.timestamp}</span>
                    </div>
                    <button class="btn-delete-item" onclick="deleteItem(${item.id}, event)">×</button>
                </div>
            `).join('');
        }

        window.loadSnippetById = function(id) {
            const history = JSON.parse(localStorage.getItem('bso_history') || '[]');
            const item = history.find(i => i.id === id);
            if (!item) return;
            inputs.title.value = item.title;
            inputs.desc.value = item.desc;
            inputs.theme.value = item.theme;
            inputs.size.value = item.size;
            displays.title.textContent = item.title;
            displays.desc.textContent = item.desc;
            displays.box.className = `snippet-container ${item.size} ${item.theme}`;
            updateFontSize();
        };

        inputs.title.addEventListener('input', (e) => displays.title.textContent = e.target.value);
        inputs.desc.addEventListener('input', (e) => {
            displays.desc.textContent = e.target.value;
            updateFontSize();
        });
        inputs.theme.addEventListener('change', () => displays.box.className = `snippet-container ${inputs.size.value} ${inputs.theme.value}`);
        inputs.size.addEventListener('change', () => {
            displays.box.className = `snippet-container ${inputs.size.value} ${inputs.theme.value}`;
            setTimeout(updateFontSize, 300);
        });

        document.getElementById('print-trigger').addEventListener('click', () => {
            saveToHistory();
            window.print();
        });

        window.onload = () => { renderHistory(); updateFontSize(); };
        window.onresize = updateFontSize;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قصاصات المكتب الاستراتيجي</title>
    <link href="https://fonts.cdnfonts.com/css/dubai" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0b9a91;
            --secondary-color: #534741;
            --bg-color: #cbd5e1;
            --white: #ffffff;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Dubai', sans-serif; }
        body { background-color: var(--bg-color); display: flex; flex-direction: column; min-height: 100vh; }

        /* لوحة التحكم */
        .controls-panel {
            width: 100%; background: var(--white); padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 1rem;
            z-index: 10;
        }

        @media (min-width: 992px) {
            body { flex-direction: row; }
            .controls-panel { width: 380px; height: 100vh; overflow-y: auto; position: sticky; top: 0; }
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
        .sidebar-logo { width: 40px; height: auto; }
        .header-title { color: var(--primary-color); font-size: 1.2rem; font-weight: 700; border-right: 4px solid var(--primary-color); padding-right: 10px; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--secondary-color); }
        input, textarea, select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; width: 100%; }

        .btn-print { background-color: var(--primary-color); color: var(--white); border: none; padding: 1rem; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-print:hover { background-color: #087a73; }

        /* السجل */
        .history-section { margin-top: 1.5rem; border-top: 2px solid #f1f5f9; padding-top: 1rem; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-clear { background: none; border: none; color: var(--danger); font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; font-size: 0.85rem; }
        .btn-del { background: #fee2e2; color: var(--danger); border: none; width: 24px; height: 24px; border-radius: 5px; cursor: pointer; }

        /* منطقة المعاينة */
        .preview-area { flex: 1; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; background: #94a3b8; }
        .snippet-container { background-color: var(--white); position: relative; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        
        .size-a5 { width: 14.8cm; height: 21cm; }
        .size-a6 { width: 10.5cm; height: 14.8cm; }
        .size-square { width: 12cm; height: 12cm; }

        .theme-white { background: var(--white); color: var(--secondary-color); }
        .theme-turquoise { background: var(--primary-color); color: var(--white); }
        .theme-turquoise .logo-img { filter: brightness(0) invert(1); }

        .snippet-content { padding: 1.2cm; height: 100%; display: flex; flex-direction: column; }
        .logo-header { text-align: center; margin-bottom: 1rem; margin-top: -0.5cm; }
        .logo-img { max-width: 65px; height: auto; }
        
        .snippet-title { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; position: relative; padding-bottom: 10px; }
        .snippet-title::after { content: ""; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background-color: var(--primary-color); border-radius: 2px; }

        .desc-container { flex: 1; overflow: hidden; }
        .snippet-desc { width: 100%; line-height: 1.8; text-align: justify; font-size: 1.3rem; white-space: pre-wrap; }
        .snippet-footer { margin-top: auto; padding-top: 1rem; border-top: 1.5px solid #f1f5f9; text-align: center; font-weight: 700; }

        @media print {
            @page { margin: 0; size: auto; }
            body { background: white !important; }
            .controls-panel { display: none !important; }
            .preview-area { display: block !important; padding: 0 !important; margin: 0 !important; background: none !important; overflow: visible !important; }
            .snippet-container { 
                box-shadow: none !important; border: none !important; 
                position: absolute !important; top: 0 !important; left: 0 !important; right: 0 !important; margin: auto !important; 
                page-break-inside: avoid !important;
            }
            .size-a5 { width: 148mm !important; height: 210mm !important; }
            .size-a6 { width: 105mm !important; height: 148mm !important; }
            .size-square { width: 120mm !important; height: 120mm !important; }
        }
    </style>
</head>
<body>

    <aside class="controls-panel">
        <div class="sidebar-header">
            <img src="bso.png" alt="Logo" class="sidebar-logo">
            <div class="header-title">قصاصات المكتب</div>
        </div>
        
        <div class="form-group">
            <label>حجم الورقة</label>
            <select id="select-size">
                <option value="size-a5" selected>A5 (نصف صفحة)</option>
                <option value="size-a6">A6 (ربع صفحة)</option>
                <option value="size-square">مربع (12x12 سم)</option>
            </select>
        </div>

        <div class="form-group">
            <label>نمط التصميم</label>
            <select id="select-theme">
                <option value="theme-white">أبيض رسمي</option>
                <option value="theme-turquoise">فيروزي</option>
            </select>
        </div>

        <div class="form-group">
            <label>العنوان</label>
            <input type="text" id="input-title" placeholder="عنوان القصاصة...">
        </div>

        <div class="form-group">
            <label>المحتوى</label>
            <textarea id="input-desc" rows="6" placeholder="اكتب المحتوى هنا..."></textarea>
        </div>

        <button class="btn-print" id="main-action">💾 حفظ وطباعة</button>

        <div class="history-section">
            <div class="history-header">
                <span style="font-weight:700; font-size:0.9rem;">السجل</span>
                <button class="btn-clear" onclick="clearHistory()">مسح الكل</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </div>
    </aside>

    <main class="preview-area">
        <div class="snippet-container size-a5 theme-white" id="snippet-box">
            <div class="snippet-content">
                <div class="logo-header"><img src="bso.png" alt="Logo" class="logo-img"></div>
                <h1 class="snippet-title" id="display-title"></h1>
                <div class="desc-container" id="desc-parent">
                    <p class="snippet-desc" id="display-desc"></p>
                </div>
                <div class="snippet-footer">المكتب الاستراتيجي لتطوير منطقة الباحة</div>
            </div>
        </div>
    </main>

    <script>
        const inputs = {
            title: document.getElementById('input-title'),
            desc: document.getElementById('input-desc'),
            theme: document.getElementById('select-theme'),
            size: document.getElementById('select-size')
        };
        const displays = {
            title: document.getElementById('display-title'),
            desc: document.getElementById('display-desc'),
            box: document.getElementById('snippet-box'),
            parent: document.getElementById('desc-parent'),
            history: document.getElementById('history-list')
        };

        function updateFontSize() {
            const maxHeight = displays.parent.clientHeight;
            let size = 1.3;
            displays.desc.style.fontSize = size + "rem";
            while (displays.desc.scrollHeight > maxHeight && size > 0.6) {
                size -= 0.05;
                displays.desc.style.fontSize = size + "rem";
            }
        }

        // وظائف السجل
        function saveToHistory() {
            if (!inputs.desc.value.trim() && !inputs.title.value.trim()) return;
            const data = {
                id: Date.now(),
                title: inputs.title.value,
                desc: inputs.desc.value,
                theme: inputs.theme.value,
                size: inputs.size.value,
                time: new Date().toLocaleString('ar-SA', { hour: '2-digit', minute: '2-digit' })
            };
            let history = JSON.parse(localStorage.getItem('bso_history_v2') || '[]');
            history.unshift(data);
            localStorage.setItem('bso_history_v2', JSON.stringify(history.slice(0, 15)));
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('bso_history_v2') || '[]');
            displays.history.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadItem(${item.id})">
                    <div class="item-info">
                        <strong>${item.title || '(بدون عنوان)'}</strong><br>
                        <small>${item.time}</small>
                    </div>
                    <button class="btn-del" onclick="deleteItem(${item.id}, event)">×</button>
                </div>
            `).join('');
        }

        window.loadItem = (id) => {
            const history = JSON.parse(localStorage.getItem('bso_history_v2') || '[]');
            const item = history.find(i => i.id === id);
            if (!item) return;
            inputs.title.value = item.title;
            inputs.desc.value = item.desc;
            inputs.theme.value = item.theme;
            inputs.size.value = item.size;
            syncDisplay();
        };

        window.deleteItem = (id, e) => {
            e.stopPropagation();
            let history = JSON.parse(localStorage.getItem('bso_history_v2') || '[]');
            localStorage.setItem('bso_history_v2', JSON.stringify(history.filter(i => i.id !== id)));
            renderHistory();
        };

        window.clearHistory = () => { if(confirm('مسح السجل؟')) { localStorage.removeItem('bso_history_v2'); renderHistory(); } };

        function syncDisplay() {
            displays.title.textContent = inputs.title.value;
            displays.desc.textContent = inputs.desc.value;
            displays.box.className = `snippet-container ${inputs.size.value} ${inputs.theme.value}`;
            updateFontSize();
        }

        // الأحداث
        inputs.title.addEventListener('input', syncDisplay);
        inputs.desc.addEventListener('input', syncDisplay);
        inputs.theme.addEventListener('change', syncDisplay);
        inputs.size.addEventListener('change', () => { syncDisplay(); setTimeout(updateFontSize, 50); });

        document.getElementById('main-action').addEventListener('click', () => {
            saveToHistory();
            window.print();
        });

        window.onload = () => { renderHistory(); updateFontSize(); };
    </script>
</body>
</html>
